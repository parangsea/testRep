# testRep SPA용 nginx 설정 예시.
# 빌드 산출물(dist)을 nginx 로 서빙할 때 사용합니다.
#
# 사용 방법:
#   1) npm run build  ->  dist/ 생성
#   2) dist/ 의 내용을 아래 root 경로로 복사 (예: /usr/share/nginx/html)
#   3) 이 파일을 /etc/nginx/conf.d/default.conf 로 배치 후 nginx reload
#
# 핵심: SPA 는 클라이언트 라우팅을 쓰므로, 존재하지 않는 경로는
#       index.html 로 폴백해야 새로고침/직접 진입 시 404 가 나지 않습니다.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # 정적 자산(해시 파일명)은 장기 캐싱
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 라우팅 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 실제 백엔드 API 연동 시 주석을 해제하고 backend 주소를 지정하세요.
    # 프론트엔드는 /api 로 호출하므로 여기서 백엔드로 프록시합니다.
    # location /api/ {
    #     proxy_pass         http://backend:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # 기본 보안 헤더 (필요에 맞게 조정)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;

    # gzip 압축
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_types         text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
